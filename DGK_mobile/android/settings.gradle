include ':app'
rootProject.name = 'DGK_mobile'

includeBuild('../node_modules/react-native-gradle-plugin')

if (settings.hasProperty("newArchEnabled") && settings.newArchEnabled == "true") {
    include ':ReactAndroid'
    project(':ReactAndroid').projectDir = new File('../node_modules/react-native/ReactAndroid')
    include ':ReactAndroid:hermes-engine'
    project(':ReactAndroid:hermes-engine').projectDir = new File('../node_modules/react-native/ReactAndroid/hermes-engine')
}